name: Runbook validation

on:
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.ps1'
      - '**/*.permissions.json'
      - '**/*.permission.json'
      - 'CHANGELOG.md'

jobs:
  validate-runbooks:
    name: Validate runbooks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout PR (head)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 📄 Collect added PR files
        id: changes
        shell: bash
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          {
            echo "changed<<EOF"
            git diff --name-only --diff-filter=AMDR "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
            echo "EOF"
            echo "added<<EOF"
            git diff --name-only --diff-filter=A "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 📝 Enforce CHANGELOG for ps1 changes
        id: changelog
        shell: pwsh
        run: |
          $changedRaw = @'
          ${{ steps.changes.outputs.changed }}
          '@
          $changedFiles = @(
            $changedRaw -split "`r?`n" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ }
          )

          $ps1Changed = @(
            $changedFiles |
            Where-Object { $_ -match '\.ps1$' }
          )

          if ($ps1Changed.Count -eq 0) {
            Write-Output "No .ps1 changes detected. CHANGELOG check skipped."
            exit 0
          }

          $hasChangelog = $changedFiles -contains 'CHANGELOG.md'
          if (-not $hasChangelog) {
            $msg = "CHANGELOG.md must be updated whenever .ps1 files are added, modified, or removed."
            Write-Output "::error file=CHANGELOG.md,title=Missing changelog update::$msg"
            Write-Error -Message $msg -ErrorAction Stop
          }

          Write-Output "CHANGELOG.md update detected for .ps1 changes."

      - name: 🔒 Validate permissions JSON
        id: permissions
        shell: pwsh
        run: |
          $addedRaw = @'
          ${{ steps.changes.outputs.added }}
          '@
          $addedFiles = @(
            $addedRaw -split "`r?`n" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ }
          )

          . ./.github/scripts/Validate-PermissionsJson.ps1 `
              -IncludedScope @("device", "group", "org", "user") `
              -ChangedFiles $addedFiles
          "exitCode=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
          exit 0

      - name: 🔍 Validate changed runbooks
        id: runbooks
        if: always()
        shell: pwsh
        run: |
          $addedRaw = @'
          ${{ steps.changes.outputs.added }}
          '@
          $addedFiles = @(
            $addedRaw -split "`r?`n" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ }
          )

          . ./.github/scripts/Validate-Runbooks.ps1 `
              -ChangedFiles $addedFiles
          "exitCode=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
          exit 0

      - name: ❌ Fail if validation failed
        if: always()
        shell: pwsh
        run: |
          $permRaw = '${{ steps.permissions.outputs.exitCode }}'
          $rbRaw = '${{ steps.runbooks.outputs.exitCode }}'

          $perm = 1
          $rb = 1
          [void][int]::TryParse($permRaw, [ref]$perm)
          [void][int]::TryParse($rbRaw, [ref]$rb)

          if ($perm -ne 0) {
            Write-Output "FAILED: Missing/invalid permissions JSON files (exit code: $perm)"
          }

          if ($rb -ne 0) {
            Write-Output "FAILED: Runbook validation errors (exit code: $rb)"
          }

          if ($perm -ne 0 -or $rb -ne 0) {
            $parts = @()
            if ($perm -ne 0) {
              $parts += "permissions JSON validation failed (exit code: $perm)"
            }
            if ($rb -ne 0) {
              $parts += "runbook validation failed (exit code: $rb)"
            }

            $msg = "Runbook validation workflow failed: " + ($parts -join "; ")

            # Job summary (visible in the workflow run UI)
            if ($env:GITHUB_STEP_SUMMARY) {
              $lines = @(
                "## Runbook validation summary",
                "",
                "| Area | Result |",
                "|------|--------|",
                ("| Permissions JSON | {0} |" -f ($(if ($perm -eq 0) { '✅ Pass' } else { '❌ Fail' }))),
                ("| Runbook validation | {0} |" -f ($(if ($rb -eq 0) { '✅ Pass' } else { '❌ Fail' }))),
                "",
                ("**Details:** {0}" -f $msg)
              )
              $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            }

            # Single top-level annotation
            Write-Output "::error title=Runbook validation failed::$msg"
            Write-Error -Message $msg -ErrorAction Stop
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              "## Runbook validation summary",
              "",
              "| Area | Result |",
              "|------|--------|",
              "| Permissions JSON | ✅ Pass |",
              "| Runbook validation | ✅ Pass |"
            ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          Write-Output "All validations passed."
